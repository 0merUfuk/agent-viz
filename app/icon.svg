<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C970"/>
      <stop offset="100%" stop-color="#8A6A1E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" fill="#02040E"/>
  <circle cx="16" cy="16" r="14" fill="url(#glow)"/>
  <!-- Three radiating spokes → agent node motif -->
  <g stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round" opacity="0.75">
    <line x1="16" y1="16" x2="5" y2="8"/>
    <line x1="16" y1="16" x2="27" y2="8"/>
    <line x1="16" y1="16" x2="16" y2="28"/>
  </g>
  <circle cx="5" cy="8" r="1.6" fill="#60A5FA"/>
  <circle cx="27" cy="8" r="1.6" fill="#60A5FA"/>
  <circle cx="16" cy="28" r="1.6" fill="#60A5FA"/>
  <!-- Central node with gold ring = orchestrator -->
  <circle cx="16" cy="16" r="5" fill="#050914" stroke="url(#g)" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="1.8" fill="#E8C970"/>
</svg>
